name: Build Wireless Link Firmware

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    env:
      NRF_CONNECT_SDK_VERSION: v3.1.1

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            ninja-build \
            gperf \
            ccache \
            dfu-util \
            device-tree-compiler \
            libusb-1.0-0-dev

      - name: Install ARM toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y \
              gcc-arm-none-eabi \
              binutils-arm-none-eabi \
              gdb-multiarch
          # use Nordic/Zephyr GCC toolchain variant
          echo "ZEPHYR_TOOLCHAIN_VARIANT=gnuarmemb" >> $GITHUB_ENV
          echo "GNUARMEMB_TOOLCHAIN_PATH=/usr" >> $GITHUB_ENV

      - name: Install nRF Connect SDK
        run: |
          pip install --upgrade pip
          pip install west
          mkdir -p ncs
          cd ncs
          west init -m https://github.com/nrfconnect/sdk-nrf.git --mr $NRF_CONNECT_SDK_VERSION
          west update
          pip install -r zephyr/scripts/requirements.txt
          pip install -r nrf/scripts/requirements.txt
          pip install -r bootloader/mcuboot/scripts/requirements.txt

      - name: Build firmware
        run: |
          cd ${{ github.workspace }}/wirelesslink
          . ${{ github.workspace }}/ncs/zephyr/zephyr-env.sh
          west build -b cosmiic_wireless_link/nrf5340/cpuapp -d build -- -DBOARD_ROOT=${{ github.workspace }}/wirelesslink

      - name: Generate DFU package
        if: success()
        run: |
          cd ${{ github.workspace }}/wirelesslink/build
          # Create a DFU package for the application
          python3 ${{ github.workspace }}/ncs/nrf/scripts/bootloader/generate_dfu_zip.py \
            --application app_update.bin \
            --output-directory . \
            --application-version-number 1 || true
          
      - name: Upload build artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: firmware-build
          path: |
            wirelesslink/build/zephyr/zephyr.hex
            wirelesslink/build/zephyr/zephyr.bin
            wirelesslink/build/app_update.bin
            wirelesslink/build/*.zip
          retention-days: 90

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: wirelesslink/build/

      - name: Generate build summary
        if: always()
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          if [ -f wirelesslink/build/zephyr/zephyr.hex ]; then
            echo "✅ Firmware build successful" >> $GITHUB_STEP_SUMMARY
            ls -lh wirelesslink/build/zephyr/zephyr.* >> $GITHUB_STEP_SUMMARY || true
          else
            echo "❌ Firmware build failed" >> $GITHUB_STEP_SUMMARY
          fi
